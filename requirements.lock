# Reproducibility lockfile - fully-resolved environment snapshot.
#
# Pins the exact versions of every package installed in the environment the
# paper's artifacts (test/results/*.json, power_*.json, figures) were produced
# in.
#
# Scope: a complete `pip freeze` of the development virtualenv (Python 3.12),
# minus two non-portable entries that cannot be installed elsewhere as-is:
#   - the editable install of this project itself (causal_abstraction_eval); install
#     it from a clone with `pip install .` (or `-e .`).
#   - tracr (a local path ref); install per the README:
#     `pip install git+https://github.com/google-deepmind/tracr.git`.
#     Tracr's own transitive deps (jax, dm-haiku, chex, ...) stay pinned below.
#
# This is not the dependency contract (which is in pyproject.toml). Use this file
# only to reproduce the paper exactly:
#   pip install -r requirements.lock

