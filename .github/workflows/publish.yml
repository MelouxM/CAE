name: Publish to PyPI

# Publishes the distribution to PyPI when a GitHub Release is published.
# Authentication uses PyPI Trusted Publishing (OIDC) — no API tokens or secrets
# are stored in the repository. See the project's Publishing settings on PyPI.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build backend
        run: python -m pip install --upgrade build
      - name: Build distribution
        run: python -m build
      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - name: Upload built distribution
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # The environment name must match the one registered with the PyPI trusted publisher.
    environment:
      name: pypi
      url: https://pypi.org/project/causal_abstraction_eval/
    permissions:
      id-token: write  # required for OIDC trusted publishing
    steps:
      - name: Download built distribution
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
